<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                저장하기
            </button><button class="w-full py-2 text-error font-label-md hover:bg-error-container/10 rounded-lg transition-all flex items-center justify-center gap-1" type="button">
    <span class="material-symbols-outlined text-[18px]">delete</span>
    학생 정보 삭제
</button>
</div>

<!-- Micro-interaction Script -->
<script>
        function setLearningMethod(method) {
            const visitBtn = document.getElementById('btn-visit');
            const centerBtn = document.getElementById('btn-center');
            
            if (method === 'visit') {
                visitBtn.classList.add('segmented-control-active', 'text-on-primary');
                visitBtn.classList.remove('text-on-surface-variant');
                centerBtn.classList.remove('segmented-control-active', 'text-on-primary');
                centerBtn.classList.add('text-on-surface-variant');
            } else {
                centerBtn.classList.add('segmented-control-active', 'text-on-primary');
                centerBtn.classList.remove('text-on-surface-variant');
                visitBtn.classList.remove('segmented-control-active', 'text-on-primary');
                visitBtn.classList.add('text-on-surface-variant');
            }
        }

        // Simple mask for SSN field
        const ssnInput = document.getElementById('ssn');
        ssnInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value.length > 6) {
                value = value.slice(0, 6) + ' - ' + value.slice(6, 13);
            }
            e.target.value = value.slice(0, 18);
        });

        // Form Submission Logic
        document.getElementById('student-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const saveBtn = e.target.querySelector('button[type="submit"]');
            const originalContent = saveBtn.innerHTML;
            
            // Visual feedback
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 저장 중...';
            saveBtn.disabled = true;
            
            setTimeout(() => {
                saveBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> 저장 완료';
                saveBtn.classList.replace('bg-primary', 'bg-secondary');
                
                setTimeout(() => {
                    saveBtn.innerHTML = originalContent;
                    saveBtn.classList.replace('bg-secondary', 'bg-primary');
                    saveBtn.disabled = false;
                }, 2000);
            }, 1000);
        });
    </script>
